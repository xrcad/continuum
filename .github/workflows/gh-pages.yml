name: Publish GH Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --locked

      - name: Build WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown
          wasm-bindgen --out-dir ./out --out-name bevy_game --target web \
            target/wasm32-unknown-unknown/release/bevy_gh_ci.wasm

      - name: Copy assets and HTML
        run: |
          cp -r assets out/
          cp wasm/index.html out/
          cp wasm/restart-audio-context.js out/

      - name: Verify out/ directory
        run: |
          ls -la out/
          test -f out/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
