<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>bevy-gh-ci</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "isomorphic-git": "https://esm.sh/isomorphic-git@1.37.2",
    "@zenfs/core": "https://esm.sh/@zenfs/core@2.5.0",
    "@zenfs/dom": "https://esm.sh/@zenfs/dom@1.2.7?external=@zenfs/core"
  }
}
</script>
</head>
</head>

<body>
  <!--
    Multi-device presence: all visitors to the same URL automatically see each other.
    By default the app connects to a relay at the same origin (works with xrcad-server).
    To use a hosted relay from GitHub Pages, append:  ?relay=wss://YOUR-RELAY.onrender.com
  -->
  <script type="module">
    // xrcad-git.js must load first: it configures ZenFS + OPFS and sets
    // window.xrcadGit before the WASM module can call into it.
    // OPFS requires COOP/COEP headers — see sw.js (coi-serviceworker).
    import './xrcad-git.js'
    import './restart-audio-context.js'
    import init from './bevy_game.js'

    init().catch((error) => {
      if (!error.message.startsWith("Using exceptions for control flow, don't mind me. This isn't actually an error!")) {
        throw error;
      }
    });
  </script>
</body>

</html>
